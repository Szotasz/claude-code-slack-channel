# gitleaks config — repo-specific overrides on top of the default ruleset.
#
# This file is loaded by the gitleaks-action workflow when present; defaults
# remain in effect for everything not whitelisted here.
#
# Why this exists
# ===============
# The bd (beads) pre-commit hook auto-stages `.beads/issues.jsonl` on every
# commit so memory state syncs cross-machine. bd memory entries store
# free-text "value" fields like state observations and design rationale,
# which often have high enough entropy to trip gitleaks's `generic-api-key`
# rule. Path-based allowlist beats fingerprint-by-fingerprint because
# every new memory addition would otherwise need a new entry in
# .gitleaksignore.
#
# Cross-repo tracking issue: OPS-x6n in intentsolutions-vps-runbook.

title = "claude-code-slack-channel gitleaks config"

[extend]
# Inherit gitleaks's default rule set.
useDefault = true

[allowlist]
description = "Allowlist bd memory file + intent-solutions repo-config noise"
paths = [
    '''^\.beads/.*''',
]
# GHSA-XXXX-XXXX-XXXX identifiers are public GitHub Security Advisory IDs cited
# in CHANGELOG/PR/doc entries for dep-CVE fixes. Their xxxx-xxxx-xxxx tail has
# enough entropy to trip the `generic-api-key` rule, but they are by definition
# published advisory IDs, not secrets. Match the canonical GHSA pattern so we
# don't broadly exempt random tokens.
regexes = [
    '''GHSA(?:-[a-z0-9]{4}){3}''',
]
